name: Reusable Maven Central Release Publish

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '25'
      java-distribution:
        required: false
        type: string
        default: temurin
      maven-opts:
        required: false
        type: string
        default: --sun-misc-unsafe-memory-access=allow
      sonar-enabled:
        required: false
        type: boolean
        default: true
      sonar-quality-gate-blocking:
        required: false
        type: boolean
        default: true
      sonar-project-key:
        required: false
        type: string
        default: ''
      sonar-maven-profile:
        required: false
        type: string
        default: coverage
      release-maven-profiles:
        required: false
        type: string
        default: central-release,generate-javadoc-and-source
      maven-server-id:
        required: false
        type: string
        default: central
    secrets:
      SONAR_TOKEN:
        required: false
      CENTRAL_USERNAME:
        required: true
      CENTRAL_PASSWORD:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true

jobs:
  build:
    name: Maven build and test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      -   uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
          with:
            fetch-depth: 0

      -   uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
          with:
            java-version: ${{ inputs.java-version }}
            distribution: ${{ inputs.java-distribution }}
            cache: maven

      -   name: Build and test
          env:
            MAVEN_OPTS: ${{ inputs.maven-opts }}
          run: mvn -B clean verify

  sonar:
    name: SonarQube analysis
    runs-on: ubuntu-latest

    needs:
      - build

    if: ${{ inputs.sonar-enabled }}

    permissions:
      contents: read

    steps:
      -   uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
          with:
            fetch-depth: 0

      -   uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
          with:
            java-version: ${{ inputs.java-version }}
            distribution: ${{ inputs.java-distribution }}
            cache: maven

      -   name: Validate SonarQube project key
          if: ${{ inputs.sonar-project-key == '' }}
          run: |
            echo "sonar-enabled is true, but sonar-project-key was not provided."
            exit 1

      -   name: Run blocking SonarQube analysis
          if: ${{ inputs.sonar-quality-gate-blocking }}
          env:
            MAVEN_OPTS: ${{ inputs.maven-opts }}
            GITHUB_TOKEN: ${{ github.token }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: mvn -B verify -P${{ inputs.sonar-maven-profile }} sonar:sonar -Dsonar.projectKey=${{ inputs.sonar-project-key }} -Dsonar.qualitygate.wait=true

      -   name: Run non-blocking SonarQube analysis
          if: ${{ !inputs.sonar-quality-gate-blocking }}
          continue-on-error: true
          env:
            MAVEN_OPTS: ${{ inputs.maven-opts }}
            GITHUB_TOKEN: ${{ github.token }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: mvn -B verify -P${{ inputs.sonar-maven-profile }} sonar:sonar -Dsonar.projectKey=${{ inputs.sonar-project-key }} -Dsonar.qualitygate.wait=true

  publish:
    name: Publish Maven release
    runs-on: ubuntu-latest

    needs:
      - build
      - sonar

    if: |
      always() &&
      needs.build.result == 'success' &&
      (
          inputs.sonar-enabled == false ||
          needs.sonar.result == 'success'
      )

    permissions:
      contents: read

    steps:
      -   uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      -   uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
          with:
            java-version: ${{ inputs.java-version }}
            distribution: ${{ inputs.java-distribution }}
            cache: maven
            server-id: ${{ inputs.maven-server-id }}
            server-username: CENTRAL_USERNAME
            server-password: CENTRAL_PASSWORD
            gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
            gpg-passphrase: GPG_PASSPHRASE

      -   name: Read Maven project version
          id: project-version
          env:
            MAVEN_OPTS: ${{ inputs.maven-opts }}
          run: |
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      -   name: Fail release publishing for SNAPSHOT version
          if: endsWith(steps.project-version.outputs.version, '-SNAPSHOT')
          run: |
            echo "Project version '${{ steps.project-version.outputs.version }}' is a SNAPSHOT version. Refusing to publish a Maven release."
            exit 1

      -   name: Publish package
          if: ${{ !endsWith(steps.project-version.outputs.version, '-SNAPSHOT') }}
          env:
            MAVEN_OPTS: ${{ inputs.maven-opts }}
            CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
            CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
            GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
            MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          run: mvn -B deploy -DskipTests -P${{ inputs.release-maven-profiles }}